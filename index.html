<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background: #000;
      }

      .chart-card {
      }

      .chart-card--line {
        width: 300px;
        aspect-ratio: 1 / 1;
        border: 2px solid #363636;
        border-radius: 52px;
        overflow: hidden;
        background: #1a1e1e;
      }

      .chart-card--multiline {
        width: 800px;

        background: #1a1e1e;
      }

      .chart-card--doughnut {
        width: 260px;
        padding: 10px;
        background: #1a1e1e;
      }

      .chart-card--matrix {
        width: 910px;
        /* height: 400px; */
        background: #1a1e1e;
      }
    </style>
  </head>

  <body>
    <!-- 1 Контейнер для удобства можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- <img src="1.png" alt="" style="margin-right: 50px" /> -->
      <!-- Линейный график с градиентом -->
      <div class="chart-card chart-card--line">
        <canvas id="chart-line"></canvas>
      </div>
      <div class="chart-card chart-card--line">
        <canvas id="chart-line-2"></canvas>
      </div>
    </div>

    <!-- 2 Контейнер для удобства можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- <img src="2.png" alt="" style="margin-right: 50px" /> -->
      <!-- multiline график  -->
      <div class="chart-card chart-card--multiline">
        <canvas id="chart-multiline"></canvas>
      </div>
    </div>

    <!-- 3 Контейнер для удобства можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- <img src="3.png" alt="" style="margin-right: 50px" /> -->
      <!-- doughnut график  -->
      <div class="chart-card chart-card--doughnut">
        <canvas id="chart-doughnut"></canvas>
      </div>
    </div>

    <!-- 4 Контейнер для удобства можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <img src="4.png" alt="" style="margin-right: 50px" />
      <!-- matrix график  -->
      <div class="chart-card chart-card--matrix">
        <canvas id="chart-matrix"></canvas>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
