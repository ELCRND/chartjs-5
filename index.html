<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
      }

      body {
        background: #000;
      }

      .chart-container {
        background: #1a1e1e;
      }

      .chart-container--line {
        width: 300px;
        aspect-ratio: 1 / 1;
        border: 2px solid #363636;
        border-radius: 52px;
        overflow: hidden;
      }

      .chart-container--multiline {
        width: 800px;
      }

      .chart-container--doughnut {
        width: 260px;
        padding: 20px;
      }

      .chart-container--matrix {
        width: 910px;
      }

      .chart-container--bar {
        width: 800px;
      }
    </style>
  </head>

  <body>
    <!-- 1 Контейнер для удобства, можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
      "
    >
      <!-- Линейный график с градиентом -->
      <div class="chart-container chart-container--line">
        <canvas id="chart-line"></canvas>
      </div>
      <div class="chart-container chart-container--line">
        <canvas id="chart-line-2"></canvas>
      </div>
    </div>

    <!-- 2 Контейнер для удобства, можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- multiline график  -->
      <div class="chart-container chart-container--multiline">
        <canvas id="chart-multiline"></canvas>
      </div>
    </div>

    <!-- 3 Контейнер для удобства, можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- doughnut график  -->
      <div class="chart-container chart-container--doughnut">
        <canvas id="chart-doughnut"></canvas>
      </div>
    </div>

    <!-- 4 Контейнер для удобства, можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- matrix график  -->
      <div class="chart-container chart-container--matrix">
        <canvas id="chart-matrix"></canvas>
      </div>
    </div>

    <!-- 5 Контейнер для удобства, можно удалить -->
    <div
      style="
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
      "
    >
      <!-- matrix график  -->
      <div class="chart-container chart-container--bar">
        <canvas id="chart-bar"></canvas>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
